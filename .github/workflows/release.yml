name: Release on main push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and create GitHub release
    runs-on: windows-latest
    env:
      APP_VERSION: 1.0.0
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build Windows application
        shell: pwsh
        run: |
          python -m PyInstaller --noconsole --onedir --icon=img/icon.ico --add-data "img/icon.ico;img" --add-data "LICENSE;." --add-data "THIRD_PARTY_NOTICES.md;." --name IMEAura ime_aura/__main__.py
          Compress-Archive -Path dist/IMEAura/* -DestinationPath IMEAura-windows-x64.zip

      - name: Define release tag
        id: release
        shell: bash
        run: |
          echo "tag=v${APP_VERSION}-build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: IME Aura ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: true
          files: IMEAura-windows-x64.zip
